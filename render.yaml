services:
  - type: web
    name: zomato-ai-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt && python -m src.phase1.load_data
    startCommand: python -m uvicorn src.phase0.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: APP_ENV
        sync: false
      - key: APP_NAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: HF_DATASET_ID
        sync: false
      - key: HF_DATASET_SPLIT
        sync: false
      - key: SQLITE_PATH
        sync: false
      - key: CRITICAL_NULL_THRESHOLD
        sync: false
      - key: MAX_ALLOWED_DUPLICATE_RATIO
        sync: false
