services:
  - type: web
    name: zomato-ai-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn src.phase0.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
